site_name: Templify
site_description: A powerful templating library that supports multiple template formats and data structures

# Pages used as theme static templates only; omit from sidebar (strict nav check).
not_in_nav: |
  theme/404.md

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  custom_dir: docs/theme
  static_templates:
    - 404.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.tilde
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: python

nav:
  - Home: index.md
  - Development:
    - Contributing: development/contributing.md
    - Architecture: development/architecture.md
    - "Architecture decisions":
        - Overview: architecture/adr/README.md
        - "ADR-001 JSON masking": architecture/adr/001-json-masking-non-mutating.md
    - GitHub Pages: development/GITHUB_PAGES.md
  - CV PoC:
    - Alternatives to Templify: cv_poc/alternatives-to-templify.md
    - Data model: cv_poc/data_model.md
    - Validation runbook: cv_poc/validation.md
  - Reference:
    - Requirements: reference/requirements.md
    - Implementation Plan: IMPLEMENTATION_PLAN.md
    - Installation: INSTALL.md
    - Development Guide: DEVELOP.md

plugins:
  - search
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: datetime
      fallback_to_build_date: true
      enable_git_follow: false
